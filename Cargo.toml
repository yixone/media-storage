[package]
name = "media-storage"
version = "0.1.0"
edition = "2024"

[dependencies]
# Async
async-trait = "0.1.89"
futures = "0.3.32"
tokio = { version = "1.47.1", features = ["fs", "io-util"] }
tokio-util = { version = "0.7.16", features = ["io"] }

# Utils/Types
hex = "0.4.3"
bytes = "1.11.1"
uuid = { version = "1.17.0", features = ["v4"] }

# Crypto
sha2 = "0.10.9"
